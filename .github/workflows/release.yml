name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify tag matches project version
        run: |
          PROJECT_VERSION=$(grep "^version" gradle.properties | cut -d= -f2 | tr -d ' ')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match project version ($PROJECT_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Build
        run: ./gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OrynPlugins v${{ steps.version.outputs.VERSION }}"
          body: |
            ## OrynPlugins v${{ steps.version.outputs.VERSION }}

            ### Changes
            <!-- Add changelog entries here -->

            ### Installation
            1. Download `OrynPlugins-${{ steps.version.outputs.VERSION }}.jar` from this release
            2. Place in `plugins/` folder
            3. Restart server

            ### Maven
            ```kotlin
            repositories {
                maven("https://maven.oryn.my.id")
            }
            dependencies {
                compileOnly("net.oryn.mc:orynplugins:${{ steps.version.outputs.VERSION }}")
            }
            ```
          files: build/libs/OrynPlugins-*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
