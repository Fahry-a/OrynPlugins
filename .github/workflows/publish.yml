name: Build & Publish to Maven Repo

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Publish to Local Repo
        run: ./gradlew clean build publish --no-daemon

      - name: Upload to B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          AWS_DEFAULT_REGION: us-east-005
        run: |
          aws s3 sync build/repo/ s3://maven-repo/ \
            --endpoint-url https://s3.us-east-005.backblazeb2.com \
            --no-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrynPlugins-${{ github.ref_name }}
          path: build/libs/*.jar
